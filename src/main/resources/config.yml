# ─── Join Intelligence Alerts Configuration ───
# Detects client information, mods, and suspicious activity on player join.

# ─── General Settings ───
settings:
  # Alert staff when a player joins
  alert-on-join: true
  # Log join data to database
  database-logging: true
  # Check for updates on startup
  check-updates: true

# ─── Client Detection ───
client-detection:
  # Detect Minecraft version from protocol
  detect-version: true
  # Detect client brand (Fabric, Forge, NeoForge, Vanilla, etc.)
  detect-brand: true
  # Track mod count via Fabric/Forge handshake
  track-mod-count: true
  # Scan mod names for suspicious keywords
  scan-mods: true

# ─── Alert Settings ───
alerts:
  enabled: true
  # Send notification when player joins (shows version + client + mod count)
  join-notification: true
  # Send warning if suspicious mods are detected
  suspicious-mod-warning: true
  # Send warning if a known cheat client brand is detected
  cheat-client-warning: true
  # Send alert for high mod counts (configure threshold below)
  high-mod-count-warning: true
  high-mod-count-threshold: 100

# ─── Staff Alert Format ───
staff-alert:
  prefix: "&8[&bJoinIntelligence&8]"
  join-format: "&e%player% &7joined using &b%version% &f%client% &7with &e%mod_count% &7mods"
  client-brand-format: "&7Client: &f%brand%"
  suspicious-format: "&c⚠ &e%player% &7has suspicious mods: &c%mods%"
  cheat-format: "&4⚠ &e%player% &7may be using: &4%client%"
  high-mod-count-format: "&6⚠ &e%player% &7has &6%mod_count% &7mods"
  hover:
    enabled: true
    join-hover: "&7IP: &f%ip%\n&7Version: &f%version%\n&7Client: &f%client%\n&7Mods: &f%mod_count%\n&7UUID: &f%uuid%"
    suspicious-hover: "&7Suspicious mods: &c%mods%\n&7Click to teleport"
  click:
    enabled: true
    # Commands that run when clicking the alert
    teleport-command: "/tp %player%"
    inspect-command: "/inventory %player%"

# ─── Discord Webhook ───
discord:
  enabled: false
  webhook-url: "YOUR_WEBHOOK_URL_HERE"
  # Available placeholders: %player%, %uuid%, %ip%, %version%, %client%, %brand%, %mod_count%, %mods%, %suspicious_mods%
  join-message:
    enabled: true
    title: "Player Joined"
    description: "**%player%** joined the server"
    color: 65280 # Green
    fields:
      - name: "Version"
        value: "%version%"
        inline: true
      - name: "Client"
        value: "%client%"
        inline: true
      - name: "Mod Count"
        value: "%mod_count%"
        inline: true
      - name: "Brand"
        value: "%brand%"
        inline: true
      - name: "IP Address"
        value: "%ip%"
        inline: false
  suspicious-message:
    enabled: true
    title: "Suspicious Mods Detected"
    description: "**%player%** has suspicious mods"
    color: 16711680 # Red
    fields:
      - name: "Suspicious Mods"
        value: "%suspicious_mods%"
        inline: false
      - name: "Total Mod Count"
        value: "%mod_count%"
        inline: true
      - name: "Version"
        value: "%version%"
        inline: true

