# ─── Database Settings ───
database:
  # Supported: H2 (embedded)
  type: H2
  h2:
    file: "plugins/JoinIntelligence/data"
    table: "join_logs"
    # Auto-create table on startup
    auto-create: true
  # Retention in days (0 = keep forever)
  retention-days: 90
  # Auto-flag threshold (detections before appearing in /sus flagged)
  auto-flag-threshold: 3

# ─── Detection Severity Levels ───
# Used for staff alerts, punishments, Discord logging, and GUI coloring
# Each category defines its own urgency, colors, and alert behavior
detection-severity:
  cheating:
    urgency: MEDIUM
    color: YELLOW
    prefix: "&6[MEDIUM]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  duping:
    urgency: HIGH
    color: RED
    prefix: "&4[HIGH]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  xray:
    urgency: LOW
    color: GREEN
    prefix: "&a[LOW]"
    staff-alert: true
    auto-log: true
    discord-webhook: false
  macroing:
    urgency: MEDIUM
    color: GOLD
    prefix: "&6[MEDIUM]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  freecam:
    urgency: MEDIUM
    color: YELLOW
    prefix: "&6[MEDIUM]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  fly:
    urgency: HIGH
    color: RED
    prefix: "&4[HIGH]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  speed:
    urgency: LOW
    color: GREEN
    prefix: "&a[LOW]"
    staff-alert: true
    auto-log: true
    discord-webhook: false
  killaura:
    urgency: HIGH
    color: RED
    prefix: "&4[HIGH]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  scaffold:
    urgency: MEDIUM
    color: YELLOW
    prefix: "&6[MEDIUM]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  nuker:
    urgency: HIGH
    color: RED
    prefix: "&4[HIGH]"
    staff-alert: true
    auto-log: true
    discord-webhook: true
  suspect:
    urgency: LOW
    color: AQUA
    prefix: "&b[SUSPECT]"
    staff-alert: true
    auto-log: true
    discord-webhook: true

# Example Outputs:
#   [HIGH] Steve detected for Duping
#   [MEDIUM] Alex detected for Cheating
#   [LOW] Bob suspicious X-Ray activity
#   [SUSPECT] /sus command manual flag

# ─── Flight Check Configuration ───
flight-check:
  enabled: true
  # Max allowed airtime difference from expected physics (in server ticks)
  max-airtime-ticks: 40
  # Ping threshold for high-ping handling (ms)
  high-ping-threshold: 400
  urgency: HIGH
  high-ping-handling:
    enabled: true
    urgency: LOW
    kick-player: true
    setback-player: false
    kick-message: "&cUnstable connection detected. Please reconnect."
  setback:
    enabled: true
  alerts:
    enabled: true
  vl:
    amount: 10
